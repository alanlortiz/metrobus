name: Monitor Metrobus CDMX

on:
  schedule:
    - cron: '30 10 * * 1-5' # Mañana
    - cron: '20 22 * * 1-5' # Tarde
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # ⚠️ IMPORTANTE: Permisos para que el bot pueda subir el CSV a tu repositorio
    permissions:
      contents: write 

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: |
          pip install -r requirements.txt

      - name: Ejecutar script de extracción y alertas
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          USUARIO_API_KEY: ${{ secrets.USUARIO_API_KEY }}
          SENHA_API_KEY: ${{ secrets.SENHA_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python alerta_metrobus.py

      # ESTE ES EL PASO NUEVO QUE SUBE EL CSV
      - name: Guardar Historial en Repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add historial_metrobus.csv
          # El [skip ci] evita que GitHub se trabe en un ciclo infinito de ejecución
          git commit -m "📊 Actualiza historial de datos [skip ci]" || echo "No hay cambios para hacer commit"
          git push
